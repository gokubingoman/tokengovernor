<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 22 22" role="img" aria-labelledby="title desc">
  <title id="title">TokenGovernor</title>
  <desc id="desc">Rounded square mark matching the TokenGovernor landing nav — off-white to zinc gradient with a subtle edge.</desc>
  <defs>
    <linearGradient id="navTile" gradientUnits="userSpaceOnUse" x1="2" y1="2" x2="20" y2="20">
      <!-- Aligns with landing: linear-gradient(145deg, #fafafa 0%, #52525b 100%) -->
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#52525b"/>
    </linearGradient>
  </defs>
  <rect
    x="0.5"
    y="0.5"
    width="21"
    height="21"
    rx="6"
    ry="6"
    fill="url(#navTile)"
    stroke="rgba(255, 255, 255, 0.12)"
    stroke-width="1"
  />
</svg>
